name: Deploy Production

on:
  push:
    branches: [main, master]

concurrency:
  group: deploy-prod
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: [self-hosted, linux]
    timeout-minutes: 15

    env:
      COMPOSE_CMD: ""

    steps:
      - name: Checkout latest code
        uses: actions/checkout@v4
        with:
          clean: true

      - name: Symlink .env file
        run: |
          ENV_SOURCE="/opt/nexus/.env"
          if [ ! -f "$ENV_SOURCE" ]; then
            echo "ERROR: No .env file found at $ENV_SOURCE"
            echo "Create it with production secrets before deploying."
            exit 1
          fi
          ln -sf "$ENV_SOURCE" .env
          echo "Linked .env → $ENV_SOURCE"

      - name: Verify Docker is available
        id: docker-check
        run: |
          docker --version
          if docker compose version > /dev/null 2>&1; then
            echo "compose_cmd=docker compose" >> "$GITHUB_OUTPUT"
            docker compose version
          elif docker-compose --version > /dev/null 2>&1; then
            echo "compose_cmd=docker-compose" >> "$GITHUB_OUTPUT"
            docker-compose --version
          else
            echo "ERROR: Neither 'docker compose' nor 'docker-compose' found."
            exit 1
          fi

      - name: Stop existing prod containers
        run: |
          ${{ steps.docker-check.outputs.compose_cmd }} -p nexus-prod -f docker-compose.yml -f docker-compose.prod.yml down --remove-orphans || true

      - name: Build and start prod containers
        run: |
          ${{ steps.docker-check.outputs.compose_cmd }} -p nexus-prod -f docker-compose.yml -f docker-compose.prod.yml up -d --build --force-recreate

      - name: Sync database password
        run: |
          source .env 2>/dev/null || true
          PW="${POSTGRES_PASSWORD:-postgres}"

          if docker exec nexus-postgres psql -U postgres -c "SELECT 1" > /dev/null 2>&1; then
            docker exec nexus-postgres psql -U postgres -c "ALTER USER postgres WITH PASSWORD '${PW}'"
            echo "Database password synced."
          else
            echo "Normal auth failed — attempting via local trust override..."
            docker exec nexus-postgres bash -c "
              cp /var/lib/postgresql/data/pg_hba.conf /var/lib/postgresql/data/pg_hba.conf.bak
              echo 'local all all trust' > /tmp/pg_hba_override.conf
              cat /var/lib/postgresql/data/pg_hba.conf >> /tmp/pg_hba_override.conf
              cp /tmp/pg_hba_override.conf /var/lib/postgresql/data/pg_hba.conf
              pg_ctl reload -D /var/lib/postgresql/data
            "
            sleep 2
            docker exec nexus-postgres psql -U postgres -c "ALTER USER postgres WITH PASSWORD '${PW}'"
            docker exec nexus-postgres bash -c "
              cp /var/lib/postgresql/data/pg_hba.conf.bak /var/lib/postgresql/data/pg_hba.conf
              pg_ctl reload -D /var/lib/postgresql/data
            "
            echo "Database password synced via trust override."
          fi

          docker restart nexus-server

      - name: Verify server is responding
        run: |
          for i in $(seq 1 20); do
            if curl -sf http://localhost:3001/health > /dev/null 2>&1; then
              echo "Server is responding on port 3001."
              break
            fi
            if [ "$i" -eq 20 ]; then
              echo "Server did not respond after 20 attempts. Logs:"
              ${{ steps.docker-check.outputs.compose_cmd }} -p nexus-prod -f docker-compose.yml -f docker-compose.prod.yml logs server
              exit 1
            fi
            echo "Waiting for server... (attempt $i/20)"
            sleep 5
          done

      - name: Verify client is responding
        run: |
          for i in $(seq 1 10); do
            if curl -sf http://localhost:3000 > /dev/null 2>&1; then
              echo "Client is responding on port 3000."
              break
            fi
            if [ "$i" -eq 10 ]; then
              echo "Client did not respond. Logs:"
              ${{ steps.docker-check.outputs.compose_cmd }} -p nexus-prod -f docker-compose.yml -f docker-compose.prod.yml logs client
              exit 1
            fi
            echo "Waiting for client... (attempt $i/10)"
            sleep 3
          done

      - name: Verify metrics endpoint
        run: |
          # Metrics endpoint requires auth, so just verify it returns a response (401/403 = endpoint exists)
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3001/api/metrics)
          if [ "$STATUS" = "401" ] || [ "$STATUS" = "403" ] || [ "$STATUS" = "200" ]; then
            echo "Metrics endpoint is active (HTTP $STATUS)."
          else
            echo "WARNING: Metrics endpoint returned unexpected status $STATUS"
          fi

      - name: Log deployment event
        run: |
          DEPLOY_LOG="/opt/nexus/deploy.log"
          echo "[$(date -u +%Y-%m-%dT%H:%M:%SZ)] PROD deployed commit=${{ github.sha }} branch=${{ github.ref_name }}" >> "$DEPLOY_LOG" || true

      - name: Clean up old Docker images
        run: |
          docker image prune -f || true

      - name: Deployment summary
        run: |
          echo ""
          echo "========================================="
          echo "  Nexus PROD deployed successfully!"
          echo "========================================="
          echo ""
          echo "  Commit:  ${{ github.sha }}"
          echo "  Branch:  ${{ github.ref_name }}"
          echo "  Client:  http://localhost:3000"
          echo "  Server:  http://localhost:3001"
          echo ""
          echo "  Commands:"
          echo "    Logs:    docker compose -p nexus-prod -f docker-compose.yml -f docker-compose.prod.yml logs -f"
          echo "    Stop:    docker compose -p nexus-prod -f docker-compose.yml -f docker-compose.prod.yml down"
          echo "    Status:  docker compose -p nexus-prod -f docker-compose.yml -f docker-compose.prod.yml ps"
          echo ""
