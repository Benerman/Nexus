services:
  # PostgreSQL Database (Dev)
  postgres:
    image: postgres:15-alpine
    container_name: nexus-dev-postgres
    environment:
      - POSTGRES_DB=nexus_dev_db
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
    volumes:
      - nexus-dev-postgres-data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5433:5432"
    restart: unless-stopped
    networks:
      - nexus-dev-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -U postgres -d nexus_dev_db"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'

  # Redis Cache (Dev)
  redis:
    image: redis:7-alpine
    container_name: nexus-dev-redis
    command: redis-server --appendonly yes
    volumes:
      - nexus-dev-redis-data:/data
    ports:
      - "127.0.0.1:6380:6379"
    restart: unless-stopped
    networks:
      - nexus-dev-internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'

  # Backend Server (Dev)
  server:
    build: ./server
    container_name: nexus-dev-server
    ports:
      - "3003:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/nexus_dev_db
      - REDIS_URL=redis://redis:6379
      - CLIENT_URL=${CLIENT_URL:-https://${DEV_DOMAIN:-localhost:3002}}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set in .env.dev}
      - SESSION_EXPIRY=604800000
      - REFRESH_EXPIRY=2592000000
      - MAX_MESSAGE_LENGTH=2000
      - MAX_ATTACHMENTS=4
      - MAX_ATTACHMENT_SIZE=10485760
      - ENABLE_GUEST_MODE=true
      - RATE_LIMIT_MESSAGES=10
      - RATE_LIMIT_WINDOW=10000
      - LOG_LEVEL=info
      - GIPHY_API_KEY=${GIPHY_API_KEY}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - STUN_URLS=${STUN_URLS:-stun:stun.l.google.com:19302,stun:stun1.l.google.com:19302}
      - TURN_URL=${TURN_URL:-}
      - TURN_SECRET=${TURN_SECRET:-}
      - PLATFORM_ADMIN=${PLATFORM_ADMIN:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - nexus-dev-internal
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'

  # Frontend Client (Dev)
  client:
    build:
      context: ./client
      dockerfile: Dockerfile.dev
      args:
        - REACT_APP_SERVER_URL=https://${DEV_DOMAIN:-dev.nexus.example.com}
    container_name: nexus-dev-client
    ports:
      - "3002:80"
    environment:
      - REACT_APP_SERVER_URL=https://${DEV_DOMAIN:-dev.nexus.example.com}
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - nexus-dev-internal
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.5'

networks:
  # Internal network for dev stack (isolated from production)
  nexus-dev-internal:
    driver: bridge

volumes:
  nexus-dev-postgres-data:
  nexus-dev-redis-data:
