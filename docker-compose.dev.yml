# Dev overrides — use with: docker compose -p nexus-dev -f docker-compose.yml -f docker-compose.dev.yml --env-file .env.dev up -d --build
# Requires .env.dev symlinked from /opt/nexus-dev/.env

services:
  postgres:
    container_name: nexus-dev-postgres
    environment:
      - POSTGRES_DB=nexus_dev_db
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
    ports:
      - "127.0.0.1:5433:5432"
    networks:
      - nexus-dev-network

  redis:
    container_name: nexus-dev-redis
    ports:
      - "127.0.0.1:6380:6379"
    networks:
      - nexus-dev-network

  server:
    container_name: nexus-dev-server
    ports:
      - "3003:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/nexus_dev_db
      - REDIS_URL=redis://redis:6379
      - CLIENT_URL=${CLIENT_URL:-http://localhost:3002}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set in .env.dev}
      - SESSION_EXPIRY=604800000
      - REFRESH_EXPIRY=2592000000
      - MAX_MESSAGE_LENGTH=2000
      - MAX_ATTACHMENTS=4
      - MAX_ATTACHMENT_SIZE=10485760
      - ENABLE_GUEST_MODE=true
      - RATE_LIMIT_MESSAGES=10
      - RATE_LIMIT_WINDOW=10000
      - LOG_LEVEL=info
      - GIPHY_API_KEY=${GIPHY_API_KEY}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - STUN_URLS=${STUN_URLS:-stun:stun.l.google.com:19302,stun:stun1.l.google.com:19302}
      - TURN_URL=${TURN_URL:-}
      - TURN_SECRET=${TURN_SECRET:-}
      - PLATFORM_ADMIN=${PLATFORM_ADMIN:-}
    networks:
      - nexus-dev-network

  client:
    build:
      context: ./client
      dockerfile: Dockerfile.dev
      args:
        - REACT_APP_SERVER_URL=${REACT_APP_SERVER_URL:-http://localhost:3003}
    container_name: nexus-dev-client
    ports:
      - "3002:80"
    environment:
      - REACT_APP_SERVER_URL=${REACT_APP_SERVER_URL:-http://localhost:3003}
    networks:
      - nexus-dev-network

networks:
  nexus-dev-network:
    driver: bridge
